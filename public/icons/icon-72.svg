<svg xmlns="http://www.w3.org/2000/svg" width="72" height="72" viewBox="0 0 72 72">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="72" height="72" fill="url(#bg)" rx="13"/>
  <!-- Glow -->
  <ellipse cx="36" cy="29" rx="29" ry="22" fill="url(#glow)"/>
  <!-- Diamond symbol -->
  <polygon points="36,13 52,36 36,59 20,36" 
    fill="none" stroke="#D4AF37" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- Inner diamond -->
