<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <radialGradient id="bg" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a1400"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="192" height="192" fill="url(#bg)" rx="35"/>
  <!-- Glow -->
  <ellipse cx="96" cy="77" rx="77" ry="58" fill="url(#glow)"/>
  <!-- Diamond symbol -->
  <polygon points="96,35 138,96 96,157 54,96" 
    fill="none" stroke="#D4AF37" stroke-width="4.8" stroke-linejoin="round"/>
  <!-- Inner diamond -->
  <polygon points="96,61 119,96 96,131 73,96" 
    fill="#D4AF37" opacity="0.9"/>
  <!-- Dustify label (only for larger icons) -->
</svg>