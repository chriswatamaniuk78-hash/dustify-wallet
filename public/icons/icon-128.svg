    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#D4AF37" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="128" height="128" fill="url(#bg)" rx="23"/>
  <!-- Glow -->
  <ellipse cx="64" cy="51" rx="51" ry="38" fill="url(#glow)"/>
  <!-- Diamond symbol -->
  <polygon points="64,23 92,64 64,105 36,64" 
